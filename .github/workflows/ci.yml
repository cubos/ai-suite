name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - run: pnpm run lint

  audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm audit --production

  check-todos:
    name: Check TODOs
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm dlx leasot 'src/**/*.ts'

  test:
    name: Test (With real providers)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - run: pnpm run test

  publish-dev:
    name: NPM Package (DEV)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - run: pnpm version 1.0.${{ github.run_id }}.dev --no-git-checks || true
      - run: pnpm run build
      - run: pnpm publish --no-git-checks --tag dev --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-release:
    name: NPM Package (Release)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          pnpm version $VERSION --no-git-checks || true
      - run: pnpm run build
      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm i --frozen-lockfile
      - run: pnpm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
          name: github-pages-${{ github.run_id }}
      - uses: actions/deploy-pages@v4
        id: deployment
        with:
          artifact_name: github-pages-${{ github.run_id }}
